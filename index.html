<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>İsot'a Mektup 💌</title>
  <style>
    :root{
      --bg1:#1b1020;
      --bg2:#3d1634;
      --bg3:#7f1d3a;
      --paper:#fff8ee;
      --paper2:#ffe8d6;
      --ink:#4a1d2b;
      --muted:#8b5360;
      --seal:#e11d48;
      --sealDark:#9f1239;
      --gold:#ffd08a;
      --shadow:0 30px 90px rgba(0,0,0,.45);
    }

    *{box-sizing:border-box}

    html, body{height:100%}

    body{
      margin:0;
      min-height:100svh;
      display:grid;
      place-items:center;
      padding:26px 18px;
      overflow:hidden;
      font-family: ui-rounded, "SF Pro Rounded", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color:white;
      background:
        radial-gradient(900px 680px at 18% 12%, rgba(255, 192, 203, .26), transparent 55%),
        radial-gradient(760px 600px at 84% 18%, rgba(255, 208, 138, .24), transparent 52%),
        radial-gradient(760px 600px at 50% 92%, rgba(225, 29, 72, .30), transparent 58%),
        linear-gradient(145deg, var(--bg1), var(--bg2) 45%, var(--bg3));
    }

    body::before{
      content:"";
      position:fixed;
      inset:-40px;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.13) 0 1px, transparent 2px),
        radial-gradient(circle at 70% 20%, rgba(255,255,255,.10) 0 1px, transparent 2px),
        radial-gradient(circle at 45% 80%, rgba(255,255,255,.09) 0 1px, transparent 2px);
      background-size:90px 90px, 130px 130px, 110px 110px;
      animation: drift 18s linear infinite;
      pointer-events:none;
      opacity:.8;
    }

    @keyframes drift{
      from{transform:translate3d(0,0,0)}
      to{transform:translate3d(-70px,45px,0)}
    }

    .wrap{
      width:min(440px, 100%);
      display:grid;
      place-items:center;
      gap:22px;
      position:relative;
      z-index:1;
    }

    .top{
      text-align:center;
      opacity:.98;
      transition:opacity .5s ease, transform .5s ease;
    }

    .top h1{
      margin:0;
      font-size:clamp(28px, 8vw, 44px);
      line-height:1;
      letter-spacing:-.04em;
      text-shadow:0 8px 32px rgba(0,0,0,.30);
    }

    .top p{
      margin:12px 0 0;
      color:rgba(255,255,255,.74);
      font-size:15px;
      line-height:1.45;
    }

    .scene{
      width:min(360px, 92vw);
      height:360px;
      position:relative;
      display:grid;
      place-items:end center;
      filter: drop-shadow(0 34px 44px rgba(0,0,0,.36));
    }

    .letter{
      position:absolute;
      left:50%;
      bottom:92px;
      width:88%;
      min-height:210px;
      padding:28px 24px 24px;
      border-radius:18px;
      color:var(--ink);
      background:
        linear-gradient(135deg, rgba(255,255,255,.72), transparent 38%),
        linear-gradient(180deg, var(--paper), var(--paper2));
      box-shadow:0 24px 58px rgba(0,0,0,.28);
      transform:translate(-50%, 85px) scale(.92);
      opacity:0;
      transition:transform .9s cubic-bezier(.2,.85,.2,1), opacity .45s ease;
      z-index:1;
      pointer-events:none;
      overflow:hidden;
    }

    .letter::before{
      content:"";
      position:absolute;
      inset:14px;
      border:1px solid rgba(127,29,58,.16);
      border-radius:14px;
      pointer-events:none;
    }

    .letter::after{
      content:"♡";
      position:absolute;
      right:20px;
      bottom:10px;
      color:rgba(225,29,72,.20);
      font-size:58px;
      transform:rotate(-12deg);
    }

    .letter .eyebrow{
      color:var(--muted);
      font-size:13px;
      letter-spacing:.18em;
      text-transform:uppercase;
      margin:0 0 14px;
      font-weight:800;
    }

    .letter .text{
      margin:0;
      font-size:clamp(20px, 5.1vw, 27px);
      line-height:1.26;
      letter-spacing:-.035em;
      font-weight:760;
    }

    .envelope{
      position:absolute;
      left:50%;
      bottom:44px;
      width:100%;
      height:218px;
      transform:translateX(-50%);
      border-radius:18px;
      background:linear-gradient(145deg, #f9b0bf, #f4728f 52%, #be315d);
      box-shadow:var(--shadow);
      overflow:visible;
      z-index:3;
    }

    .envelope::before,
    .envelope::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:18px;
      pointer-events:none;
    }

    .envelope::before{
      clip-path:polygon(0 100%, 50% 45%, 100% 100%);
      background:linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.02));
      z-index:4;
    }

    .envelope::after{
      clip-path:polygon(0 0, 50% 56%, 100% 0, 100% 100%, 0 100%);
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(127,29,58,.08));
      z-index:2;
    }

    .flap{
      position:absolute;
      left:0;
      top:0;
      width:100%;
      height:136px;
      transform-origin:50% 0%;
      clip-path:polygon(0 0, 100% 0, 50% 100%);
      background:linear-gradient(180deg, #ffd0da, #fb7185 65%, #be315d);
      border-radius:18px 18px 0 0;
      z-index:5;
      transition:transform .9s cubic-bezier(.2,.9,.2,1), filter .7s ease;
      filter:brightness(1.03);
    }

    .sealButton{
      position:absolute;
      left:50%;
      top:70px;
      transform:translateX(-50%);
      width:122px;
      height:110px;
      border:0;
      background:transparent;
      cursor:pointer;
      z-index:8;
      -webkit-tap-highlight-color:transparent;
      filter:drop-shadow(0 12px 24px rgba(0,0,0,.28));
      animation:pulse 1.7s ease-in-out infinite;
    }

    @keyframes pulse{
      0%,100%{transform:translateX(-50%) scale(1)}
      50%{transform:translateX(-50%) scale(1.055)}
    }

    .heart{
      position:absolute;
      inset:18px 13px 8px 13px;
      background:linear-gradient(145deg, #ff477e, var(--seal));
      transform:rotate(-45deg);
      border-radius:18px 12px 12px 18px;
      box-shadow:
        inset -10px -12px 0 rgba(159,18,57,.24),
        inset 7px 7px 0 rgba(255,255,255,.14);
    }

    .heart::before,
    .heart::after{
      content:"";
      position:absolute;
      width:100%;
      height:100%;
      border-radius:50%;
      background:inherit;
    }

    .heart::before{top:-50%; left:0}
    .heart::after{left:50%; top:0}

    .sealText{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      padding-top:11px;
      color:white;
      font-size:20px;
      line-height:1;
      font-weight:950;
      letter-spacing:-.03em;
      text-shadow:0 2px 8px rgba(0,0,0,.30);
      z-index:2;
      transform:rotate(-4deg);
    }

    .hint{
      position:absolute;
      bottom:0;
      width:100%;
      text-align:center;
      color:rgba(255,255,255,.72);
      font-size:13px;
      letter-spacing:.01em;
      transition:opacity .45s ease;
    }

    .opened .top{
      opacity:.18;
      transform:translateY(-8px) scale(.98);
    }

    .opened .flap{
      transform:rotateX(178deg);
      filter:brightness(.92);
    }

    .opened .sealButton{
      opacity:0;
      pointer-events:none;
      animation:none;
      transition:opacity .25s ease;
    }

    .opened .letter{
      opacity:1;
      transform:translate(-50%, -120px) scale(1);
      z-index:7;
      transition-delay:.18s;
    }

    .opened .hint{opacity:0}

    .spark{
      position:fixed;
      left:var(--x);
      top:var(--y);
      font-size:var(--s);
      opacity:0;
      animation:floatUp 1.55s ease-out forwards;
      pointer-events:none;
      z-index:20;
    }

    @keyframes floatUp{
      0%{transform:translate(-50%,0) scale(.65) rotate(0); opacity:0}
      15%{opacity:1}
      100%{transform:translate(-50%,-120px) scale(1.3) rotate(16deg); opacity:0}
    }

    @media (max-height:720px){
      .wrap{gap:12px}
      .top h1{font-size:30px}
      .top p{display:none}
      .scene{height:330px}
      .opened .letter{transform:translate(-50%, -105px) scale(.96)}
      .letter{min-height:190px}
    }
  </style>
</head>
<body>
  <main id="app" class="wrap" aria-live="polite">
    <section class="top">
      <h1>İsot’a küçük bir mektup</h1>
      <p>Bir zarf, bir mühür, biraz kalp… gerisi sende.</p>
    </section>

    <section class="scene" aria-label="Açılabilir mektup">
      <article class="letter" id="letter">
        <p class="eyebrow">benden sana</p>
        <p class="text">Hayatında hiç mektup aldın mı bilmiyorum ama küçücük zarfa sığdırılmış koca bir ömür var benden sana adanan.</p>
      </article>

      <div class="envelope" id="envelope">
        <div class="flap"></div>
        <button class="sealButton" id="openBtn" type="button" aria-label="Mektubu aç">
          <span class="heart"></span>
          <span class="sealText">beni aç</span>
        </button>
      </div>

      <div class="hint">Kalpli mühre dokun 🤎</div>
    </section>
  </main>

  <script>
    const app = document.getElementById('app');
    const btn = document.getElementById('openBtn');
    let opened = false;

    function sparkle(){
      const symbols = ['🤎','💌','✨','🧩','💫'];
      for(let i=0;i<18;i++){
        const el = document.createElement('span');
        el.className = 'spark';
        el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
        el.style.setProperty('--x', (38 + Math.random()*24) + 'vw');
        el.style.setProperty('--y', (49 + Math.random()*13) + 'vh');
        el.style.setProperty('--s', (18 + Math.random()*18) + 'px');
        el.style.animationDelay = (Math.random()*0.35) + 's';
        document.body.appendChild(el);
        setTimeout(()=>el.remove(), 2100);
      }
    }

    btn.addEventListener('click', () => {
      if(opened) return;
      opened = true;
      app.classList.add('opened');
      sparkle();
    });
  </script>
</body>
</html>
